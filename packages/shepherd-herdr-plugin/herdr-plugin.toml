id = "shepherd.agents"
name = "Shepherd Agents"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Read compact Herdr agent history through Shepherd."
platforms = ["linux", "macos", "windows"]

[[actions]]
id = "agent-list"
title = "Show Shepherd agents"
contexts = ["workspace"]
command = ["node", "index.mjs", "agent-list"]

[[panes]]
id = "agents"
title = "Shepherd Agents"
placement = "split"
command = ["node", "index.mjs", "agents"]
